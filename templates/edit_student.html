<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark">

                    <h3 class="text-center">
                        ✏ Edit Student
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Roll Number
                            </label>

                            <input
                                type="text"
                                name="roll"
                                class="form-control"
                                value="{{ student[1] }}"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Student Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ student[2] }}"
                                required
                            >

                        </div>

                        <div class="d-grid gap-2">

                            <button
                                type="submit"
                                class="btn btn-success">

                                💾 Update Student

                            </button>

                            <a
                                href="/students"
                                class="btn btn-secondary">

                                ⬅ Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
